name: WireCloud CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

permissions:
  contents: read
  pull-requests: write

jobs:
  test-and-coverage:
    permissions: write-all
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-test.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-test.txt

      - name: Run tests (head)
        run: |
          pytest -q \
            --cov=src \
            --cov-branch \
            --cov-report=term-missing \
            --cov-report=xml:coverage-head.xml \
            --cov-report=json:coverage-head.json

      - name: Read head coverage
        id: head_cov
        run: |
          python - <<'PY'
          import json
          import os
          with open("coverage-head.json", "r", encoding="utf-8") as f:
              data = json.load(f)
          head = float(data["totals"]["percent_covered"])
          with open("/tmp/head_cov.txt", "w", encoding="utf-8") as out:
              out.write(f"{head:.2f}")
          print(f"head={head:.2f}")
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as out:
              out.write(f"head={head:.2f}\n")
          PY

      - name: Run tests (base branch for PR coverage diff)
        if: github.event_name == 'pull_request'
        run: |
          git worktree add /tmp/base-ref "${{ github.event.pull_request.base.sha }}"
          cd /tmp/base-ref
          pytest -q \
            --cov=src \
            --cov-branch \
            --cov-report=term-missing \
            --cov-report=xml:coverage-base.xml \
            --cov-report=json:coverage-base.json

      - name: Compare coverage (PR)
        if: github.event_name == 'pull_request'
        id: cov_diff
        run: |
          python - <<'PY'
          import json
          import os

          with open("coverage-head.json", "r", encoding="utf-8") as f:
              head = float(json.load(f)["totals"]["percent_covered"])
          with open("/tmp/base-ref/coverage-base.json", "r", encoding="utf-8") as f:
              base = float(json.load(f)["totals"]["percent_covered"])

          delta = head - base
          trend = "increased" if delta > 0 else ("decreased" if delta < 0 else "unchanged")
          sign = "+" if delta > 0 else ""

          summary = (
              f"Coverage (base -> head): {base:.2f}% -> {head:.2f}% "
              f"({sign}{delta:.2f} pp, {trend})."
          )

          print(summary)
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as out:
              out.write(f"base={base:.2f}\n")
              out.write(f"head={head:.2f}\n")
              out.write(f"delta={delta:.2f}\n")
              out.write(f"trend={trend}\n")
              out.write(f"summary={summary}\n")
          PY

      - name: Add coverage summary to workflow summary
        if: github.event_name == 'pull_request'
        run: |
          {
            echo "## Coverage report"
            echo ""
            echo "- Base coverage: ${{ steps.cov_diff.outputs.base }}%"
            echo "- Head coverage: ${{ steps.cov_diff.outputs.head }}%"
            echo "- Delta: ${{ steps.cov_diff.outputs.delta }} pp (${{ steps.cov_diff.outputs.trend }})"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Comment PR with coverage delta
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const marker = "<!-- coverage-delta-comment -->";
            const body = `${marker}
            ### Coverage Delta
            - Base: **${{ steps.cov_diff.outputs.base }}%**
            - Head: **${{ steps.cov_diff.outputs.head }}%**
            - Delta: **${{ steps.cov_diff.outputs.delta }} pp** (${{ steps.cov_diff.outputs.trend }})
            `;

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const previous = comments.find(
              (c) => c.user.type === "Bot" && c.body && c.body.includes(marker)
            );

            if (previous) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: previous.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            coverage-head.xml
            coverage-head.json
            /tmp/base-ref/coverage-base.xml
            /tmp/base-ref/coverage-base.json
          if-no-files-found: ignore
